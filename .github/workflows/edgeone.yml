name: Deploy to EdgeOne Pages

# 国内镜像 manual trigger：演示前用 docs/deploy-mirror.md 的 30s SOP 本地 deploy 才是
# 主路径（甲方拿到的链接需要鲜活的 3 小时窗口）。这里只留 workflow_dispatch 给 CI 兜底
# 用：万一本地不方便，可以从 GitHub Actions 页点 Run 触发，再去 EdgeOne 控制台拿
# preview URL（控制台 → Deployments → 点最新一次部署）。
# 凭证：repo Secrets → EDGEONE_API_TOKEN（控制台 → API Token 生成；用前先 set）

on:
  workflow_dispatch:

concurrency:
  group: edgeone-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Deploy to EdgeOne Pages (production, global area)
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}
        run: |
          if [ -z "$EDGEONE_API_TOKEN" ]; then
            echo "::error::EDGEONE_API_TOKEN secret is not set. See docs/deploy-mirror.md"
            exit 1
          fi
          npx -y edgeone pages deploy . \
            --name lab-safety-demo \
            --token "$EDGEONE_API_TOKEN" \
            --env production \
            --area global
