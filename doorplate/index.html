function buildQR(seed = 314159, n = 25) {
  const mods = new Uint8Array(n * n);
  let s = seed;
  const rnd = () => { s = (s * 1664525 + 1013904223) >>> 0; return s / 4294967296; };
  for (let i = 0; i < n * n; i++) mods[i] = rnd() < 0.45 ? 1 : 0;
  const set = (r, c, w, h, v) => {
    for (let dr = 0; dr < h; dr++) for (let dc = 0; dc < w; dc++) {
      const rr = r + dr, cc = c + dc;
      if (rr >= 0 && cc >= 0 && rr < n && cc < n) mods[rr * n + cc] = v;
    }
  };
  const finder = (r, c) => { set(r, c, 7, 7, 1); set(r + 1, c + 1, 5, 5, 0); set(r + 2, c + 2, 3, 3, 1); };
  finder(0, 0); finder(0, n - 7); finder(n - 7, 0);
  set(7, 0, 1, 8, 0); set(0, 7, 8, 1, 0);
  set(7, n - 8, 1, 8, 0); set(0, n - 8, 8, 1, 0);
  set(n - 8, 0, 1, 8, 0); set(n - 8, 7, 8, 1, 0);
  set(n - 9, n - 9, 5, 5, 1); set(n - 8, n - 8, 3, 3, 0); set(n - 7, n - 7, 1, 1, 1);
  for (let i = 8; i < n - 8; i++) {
    mods[6 * n + i] = (i % 2 === 0) ? 1 : 0;
    mods[i * n + 6] = (i % 2 === 0) ? 1 : 0;
  }
  return { mods, n };
}
const QR = buildQR();
function QRCode() {

    for (let c = 0; c < n; c++) {
      if (mods[r * n + c]) {
        cells.push(<rect key={r * n + c} x={c} y={r} width="1" height="1" fill="#0b2348" />);
      }
    }
  }
  return <svg viewBox={`0 0 ${n} ${n}`} shapeRendering="crispEdges">{cells}</svg>;
}

// ============================================================
// CAMERA
// ============================================================
function FaceMesh() {
  const pts = [
    [50, 28], [38, 32], [62, 32],
    [42, 42], [58, 42], [50, 50],
    [44, 60], [50, 62], [56, 60],
    [32, 48], [68, 48],
    [40, 70], [50, 72], [60, 70],
  ];
  return (
    <svg className="dd-cam-mesh" viewBox="0 0 100 100" preserveAspectRatio="none"
         style={{ position: 'absolute', inset: 0, width: '100%', height: '100%' }}>
      {pts.map((p, i) => <circle key={i} cx={p[0]} cy={p[1]} r="0.9" />)}
      {[[0,1],[0,2],[3,4],[3,9],[4,10],[5,7],[6,7],[7,8],[11,12],[12,13]].map(([a, b], i) => {
        const A = pts[a], B = pts[b];
        return <line key={'l'+i} x1={A[0]} y1={A[1]} x2={B[0]} y2={B[1]} strokeWidth="0.4" />;
      })}
    </svg>
  );
}

function Camera({ state }) {
  const cls = 'dd-cam' + (state === 'scanning' ? ' scanning' : state === 'err' ? ' err' : '');
  return (
    <div className={cls}>
      <svg className="feed" viewBox="0 0 100 100" preserveAspectRatio="none">
        <defs>
          <radialGradient id="camBg" cx="50%" cy="40%" r="65%">
            <stop offset="0%" stopColor="#3a445e" />
            <stop offset="65%" stopColor="#151a28" />
            <stop offset="100%" stopColor="#050a14" />
          </radialGradient>
        </defs>
        <rect width="100" height="100" fill="url(#camBg)" />
        <ellipse cx="50" cy="45" rx="22" ry="28" fill="#202738" />
        <path d="M 28 75 C 28 65 38 62 50 62 C 62 62 72 65 72 75 L 72 100 L 28 100 Z" fill="#181d2c" />
      </svg>
      <span className="dd-cam-bracket tl"></span>
      <span className="dd-cam-bracket tr"></span>
      <span className="dd-cam-bracket bl"></span>
      <span className="dd-cam-bracket br"></span>
      {state === 'scanning' && <FaceMesh />}
      {state === 'scanning' && <div className="dd-cam-scan" />}
    </div>
  );
}

// ============================================================
// FOOTER
// ============================================================
function Footer({ scene }) {
  // 本周期累积扣分 + PDF 6 月周期 label · 由 SCORING 派生（与三端共享 lib）
  const pts = SCORING.tally(scene.labViolations);
  const v = SCORING.verdict(pts, 'lab');
  return (
    <footer className="dd-footer">
      {/* 仪表带：克制的 mono 一行，传达"这块屏跟三端联动" */}
      <div className={'dd-period-bar tier-' + v.tier}>
        <span className="lbl">PERIOD POINTS</span>
        <span className="num">{pts}<span className="ceil">/{SCORING.PERIOD_LIMITS.lab}</span></span>
        <span className="dot" />
        <span className="prd">{SCORING.formatPeriod(LAB.today)}</span>
      </div>
      <div className="dd-footer-row">
        <div className={'dd-notice tone-' + scene.notice.tone}>
          <div className="ico">{scene.notice.ico}</div>
          <div className="text">{scene.notice.text}</div>
        </div>
        <div className="dd-entry">
          <div className="dd-entry-tile">
            <div className={'dd-qr ' + (scene.qr === 'disabled' ? 'disabled' : scene.qr === 'scanning' ? 'scanning' : '')}>
              <QRCode />
              {scene.qr === 'disabled' && (
                <div className="dd-qr-stamp">{scene.qrStamp || (scene.k === 'closed' ? 'OFFLINE' : '禁入')}</div>
              )}
            </div>
            <div className="cap">{scene.qr === 'disabled' ? '门禁已锁' : '扫码进门'}</div>
          </div>
          <div className="dd-entry-tile">
            <Camera state={scene.cam} />
            <div className="cap">{scene.cam === 'scanning' ? '识别中' : scene.cam === 'err' ? '识别失败' : '人脸核验'}</div>
          </div>
        </div>
      </div>
    </footer>
  );
}

// ============================================================

      <div className="checks">

// ============================================================
// MAIN COMPOSITION
// ============================================================
function DoorDisplay({ scene }) {
  const [t, setT] = React.useState(new Date());
  React.useEffect(() => {
    const id = setInterval(() => setT(new Date()), 1000);
    return () => clearInterval(id);
  }, []);
  const pad = n => String(n).padStart(2, '0');
  const time = `${pad(t.getHours())}:${pad(t.getMinutes())}:${pad(t.getSeconds())}`;
  const wd = ['SUN','MON','TUE','WED','THU','FRI','SAT'][t.getDay()];
  const date = `${t.getFullYear()}-${pad(t.getMonth() + 1)}-${pad(t.getDate())} · ${wd}`;

  return (
    <div className="dd-root" data-state={scene.state}>
      {scene.haztape && <div className={'dd-haztape' + (scene.alert ? ' flash' : '')} />}
      <Header scene={scene} time={time} date={date} />
      <main className="dd-main">
        {scene.inspectMode ? (
          <InspectMode />
        ) : (
          <>
            <Hazards />
            <KPIs scene={scene} />
            <Presence scene={scene} />
          </>
        )}
      </main>
      <Footer scene={scene} />
      {scene.haztape && <div className={'dd-haztape' + (scene.alert ? ' flash' : '')} />}
      {scene.overlay === 'success' && <SuccessOverlay />}
      {scene.overlay === 'fail' && <FailOverlay />}
    </div>
  );
}

// ============================================================
// APP / TOOLBAR / SCALE
// ============================================================
function App() {
  // URL ?mode=inspect 优先（巡查员卡刷/扫码进入检查模式）
  // URL 触发的会话不写 localStorage，避免巡查模式「粘住」下次访问
  const urlInspect = new URLSearchParams(location.search).get('mode') === 'inspect';
  const [sceneKey, setSceneKey] = React.useState(() =>
    urlInspect ? 'inspect' : (localStorage.getItem('dd-scene') || 'busy')
  );
  const [autoplay, setAutoplay] = React.useState(false);
  const [scale, setScale] = React.useState(0.45);

  React.useEffect(() => {
    // URL 触发的 inspect 会话不持久化（避免巡查员离开后下次访问仍停在巡查模式）
    if (urlInspect && sceneKey === 'inspect') return;
    localStorage.setItem('dd-scene', sceneKey);
  }, [sceneKey]);

  React.useEffect(() => {
    const fit = () => {
      const avail = window.innerHeight - 200;
      const byH = avail / 1920;
      const byW = (window.innerWidth - 60) / 1080;
      const s = Math.max(0.28, Math.min(0.6, Math.min(byH, byW)));
      setScale(s);
    };
    fit();
    window.addEventListener('resize', fit);
    return () => window.removeEventListener('resize', fit);
  }, []);

  React.useEffect(() => {
    if (!autoplay) return;
    // 自动轮播仅在前 9 个状态间循环，inspect（第 10 个）需手动触发
    const cycleScenes = SCENES.filter(s => !s.inspectMode);
    const id = setInterval(() => {
      setSceneKey(k => {
        const i = cycleScenes.findIndex(s => s.k === k);
        if (i === -1) return cycleScenes[0].k;
        return cycleScenes[(i + 1) % cycleScenes.length].k;
      });
    }, 5000);
    return () => clearInterval(id);
  }, [autoplay]);

  const scene = SCENES.find(s => s.k === sceneKey) || SCENES[0];

  return (
    <div className="dd-stage" style={{ '--dd-scale': scale }}>
      <div className="dd-toolbar">
        <h1>实验室电子门牌</h1>
        <span className="sub">Android 一体机 · <span className="mono">1080×1920 · {Math.round(scale * 100)}%</span></span>
        <div className="dd-scene-chips">
          {SCENES.map(s => (
            <button key={s.k}
              className={s.k === sceneKey ? 'active' : ''}
              onClick={() => { setAutoplay(false); setSceneKey(s.k); }}>
              <span className="chip-dot" style={{ background: s.chipDot }}></span>
              {s.label}
            </button>
          ))}
        </div>
        <button className={'dd-toggle' + (autoplay ? ' on' : '')} onClick={() => setAutoplay(v => !v)}>
          {autoplay ? '⏸ 暂停轮播' : '▶ 自动轮播 5s'}
        </button>
      </div>
      <div className="dd-frame">
        <DoorDisplay scene={scene} />
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
